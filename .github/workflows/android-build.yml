name: Android Build

on:
  pull_request:
    paths-ignore:
      - ".github/workflows/pages-www.yml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "LICENSE"
      - "README.md"
      - "docs/**"
      - "www/**"
  push:
    branches:
      - main
    tags:
      - "*"
    paths-ignore:
      - ".github/workflows/pages-www.yml"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "LICENSE"
      - "README.md"
      - "docs/**"
      - "www/**"

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented-tests:
    name: Instrumented tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: mobile
            api-level: 34
            target: google_apis
            # Lighter generic phone profile to reduce launcher/emulator hangs on GitHub runners.
            profile: medium_phone
            script: ./gradlew :mobile:connectedDebugAndroidTest
          - module: wear
            api-level: 34
            target: android-wear
            profile: wearos_large_round
            script: ./gradlew :wear:connectedDebugAndroidTest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run ${{ matrix.module }} instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: ${{ matrix.profile }}
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none -camera-front none
          script: bash -lc 'adb wait-for-device; adb shell input keyevent KEYCODE_WAKEUP || true; adb shell wm dismiss-keyguard || true; adb shell am force-stop com.google.android.apps.nexuslauncher || true; adb shell am force-stop com.android.launcher3 || true; ${{ matrix.script }}; status=$?; if [ "$status" -ne 0 ]; then mkdir -p build/ci-screenshots; adb exec-out screencap -p > "build/ci-screenshots/${{ matrix.module }}-failure.png" || true; fi; exit "$status"'

      - name: Upload instrumented test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-reports-${{ matrix.module }}
          path: |
            mobile/build/reports/androidTests/
            wear/build/reports/androidTests/
            build/ci-screenshots/

  build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew :common:test

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: common/build/reports/tests/

      - name: Run lint
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        run: ./gradlew :mobile:lintDebug :wear:lintDebug

      - name: Upload lint reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: |
            mobile/build/reports/lint-results-debug.html
            wear/build/reports/lint-results-debug.html

      - name: Build debug APK
        if: github.event_name == 'pull_request'
        run: ./gradlew :wear:assembleDebug :mobile:assembleDebug

      - name: Decode release keystore
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build release APK
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          VERSION_NAME="${GITHUB_REF_NAME}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            VERSION_NAME="1.0.${GITHUB_RUN_NUMBER}"
          fi
          MOBILE_VERSION_CODE="$((GITHUB_RUN_NUMBER * 10))" \
          WEAR_VERSION_CODE="$((GITHUB_RUN_NUMBER * 10 + 1))" \
          VERSION_NAME="$VERSION_NAME" \
          ./gradlew :wear:assembleRelease :mobile:assembleRelease

      - name: Build release bundle
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          MOBILE_VERSION_CODE="$((GITHUB_RUN_NUMBER * 10))" \
          WEAR_VERSION_CODE="$((GITHUB_RUN_NUMBER * 10 + 1))" \
          VERSION_NAME="$VERSION_NAME" \
          ./gradlew :wear:bundleRelease :mobile:bundleRelease

      - name: Upload wear release bundle to Google Play
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.swooby.parropeato
          releaseFiles: wear/build/outputs/bundle/release/*.aab
          tracks: wear:internal
          status: draft
          mappingFile: wear/build/outputs/mapping/release/mapping.txt

      - name: Upload mobile release bundle to Google Play
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.swooby.parropeato
          releaseFiles: mobile/build/outputs/bundle/release/*.aab
          tracks: internal
          status: draft
          mappingFile: mobile/build/outputs/mapping/release/mapping.txt

      - name: Upload debug APK
        if: github.event_name == 'pull_request' && success()
        uses: actions/upload-artifact@v7
        with:
          name: parropeato-debug-apk
          path: |
            wear/build/outputs/apk/debug/*.apk
            mobile/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        if: github.event_name == 'push' && success()
        uses: actions/upload-artifact@v7
        with:
          name: parropeato-release-apk
          path: |
            wear/build/outputs/apk/release/*.apk
            mobile/build/outputs/apk/release/*.apk
          if-no-files-found: error
