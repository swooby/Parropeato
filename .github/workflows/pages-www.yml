name: Pages (www)

on:
  push:
    branches:
      - main
    paths:
      - "www/**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "www/**"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pages-www-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Deploy production site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate HTML files
        run: |
          python3 -c "
          import glob
          import html.parser

          for f in sorted(glob.glob('www/**/*.html', recursive=True)):
              print('Checking', f)
              try:
                  with open(f, encoding='utf-8') as fh:
                      html.parser.HTMLParser().feed(fh.read())
              except Exception as exc:
                  raise RuntimeError(f'Invalid HTML in {f}: {exc}') from exc
              print('OK')
          "

      - name: Deploy to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: www
          clean: true
          clean-exclude: pr-preview

  deploy-pr-preview:
    name: Deploy PR preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate HTML files
        run: |
          python3 -c "
          import glob
          import html.parser

          for f in sorted(glob.glob('www/**/*.html', recursive=True)):
              print('Checking', f)
              try:
                  with open(f, encoding='utf-8') as fh:
                      html.parser.HTMLParser().feed(fh.read())
              except Exception as exc:
                  raise RuntimeError(f'Invalid HTML in {f}: {exc}') from exc
              print('OK')
          "

      - name: Deploy PR preview folder
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: www
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- Parropeato-pages-preview -->';
            const previewUrl = `https://swooby.github.io/Parropeato/pr-preview/pr-${context.payload.pull_request.number}/`;
            const body = `${marker}\n✅ Pages preview deployed: ${previewUrl}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
