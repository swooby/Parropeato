name: Docs Build

on:
  pull_request:
    paths:
      - 'docs/**'
  push:
    branches:
      - main
    paths:
      - 'docs/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate HTML files
        run: >-
          python3 -c "
          import html.parser, glob;
          [
            (print('Checking', f), html.parser.HTMLParser().feed(open(f, encoding='utf-8').read()), print('OK'))
            for f in sorted(glob.glob('docs/*.html'))
          ]"

      - name: Deploy to GitHub Pages (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: true
          clean-exclude: pr-preview

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: false

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repo = context.repo;
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/pr-preview/pr-${prNumber}/`;
            const body = `📄 **Docs preview deployed:** ${previewUrl}`;
            const comments = await github.rest.issues.listComments({
              ...repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c => c.body.startsWith('📄 **Docs preview deployed:**'));
            if (existing) {
              await github.rest.issues.updateComment({ ...repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...repo, issue_number: prNumber, body });
            }
